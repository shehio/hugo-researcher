<div class="container mt-5">
    <nav class="navbar navbar-expand-sm flex-column flex-sm-row text-nowrap p-0">
        <a class="navbar-brand mx-0 mr-sm-auto" href="{{ .Site.BaseURL }}" title="{{ .Site.Title }}">
          {{ with .Site.Params.logo }}
            <img src="{{ . | absURL }}" alt="logo">
          {{ end }}
          {{ .Site.Title }}
        </a>
        <div class="navbar-nav flex-row flex-wrap justify-content-center">
            {{ with .Site.Menus.main }}
                {{ $navbar_len := len . }}
                {{ range $i, $nav_item := . }}
                    <a class="nav-item nav-link" href="{{ $nav_item.URL }}" title="{{ $nav_item.Name }}">
                        {{ $nav_item.Pre }}{{ $nav_item.Name }}{{ $nav_item.Post }}
                    </a>
                    {{ if ne (add $i 1) $navbar_len }}
                        <span class="nav-item navbar-text mx-1">/</span>
                    {{ end }}
                {{ end }}
            {{ end }}
            <button id="theme-toggle" class="nav-item ml-2" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
                <i class="fas fa-moon" aria-hidden="true"></i>
            </button>
        </div>
    </nav>
</div>
<hr>
<script>
    (function () {
        var button = document.getElementById("theme-toggle");
        var icon = button.querySelector("i");
        var media = window.matchMedia("(prefers-color-scheme: dark)");
        function effectiveTheme() {
            return document.documentElement.dataset.theme || (media.matches ? "dark" : "light");
        }
        function paintIcon() {
            icon.className = effectiveTheme() === "dark" ? "fas fa-sun" : "fas fa-moon";
        }
        button.addEventListener("click", function () {
            var next = effectiveTheme() === "dark" ? "light" : "dark";
            document.documentElement.dataset.theme = next;
            try { localStorage.setItem("theme", next); } catch (e) {}
            paintIcon();
        });
        media.addEventListener("change", paintIcon);
        paintIcon();
    })();
</script>
